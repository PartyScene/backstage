name: PartyScene CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # Stage 1: Code Quality — fast syntax/format checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install linting tools
        run: pip install flake8 black

      - name: Run flake8 (syntax errors only)
        run: flake8 --select=E9,F63,F7,F82 . --exclude=.venv,debz,usr

      - name: Run black (formatting check)
        run: black --check . --exclude='/(\.venv|debz|usr)/'

  # Stage 2: Unit Tests per Microservice
  # Mirrors the docker-compose.test.yml service definitions.
  # Each service's Dockerfile has a `test` target that runs pytest.
  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        service: [auth, events, users, posts, media, payments, livestream, r18e]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create cloudbuild || true

      - name: Start dependencies (SurrealDB, Redis, RabbitMQ)
        run: |
          docker compose -f docker-compose.test.yml up -d surrealdb redis rabbitmq

      - name: Wait for dependencies to be healthy
        run: |
          docker compose -f docker-compose.test.yml exec -T surrealdb sh -c \
            'for i in $(seq 1 30); do curl -sf http://localhost:8000/health && exit 0; sleep 1; done; exit 1'
          docker compose -f docker-compose.test.yml exec -T redis sh -c \
            'for i in $(seq 1 15); do redis-cli ping && exit 0; sleep 1; done; exit 1'
          docker compose -f docker-compose.test.yml exec -T rabbitmq sh -c \
            'for i in $(seq 1 30); do rabbitmq-diagnostics ping && exit 0; sleep 1; done; exit 1'

      - name: Run ${{ matrix.service }} tests
        run: |
          docker compose -f docker-compose.test.yml up \
            --build --abort-on-container-exit \
            microservices.${{ matrix.service }}

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
