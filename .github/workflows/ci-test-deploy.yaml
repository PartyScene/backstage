name: PartyScene CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # Stage 1: Code Quality — fast syntax checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8 (syntax errors only)
        run: flake8 --select=E9,F63,F7,F82 . --exclude=.venv,debz,usr

  # Stage 2: Build & Test all microservices
  # Uses docker-compose.test.yml which has healthchecks and
  # service dependency ordering built in.
  integration-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create cloudbuild || true

      - name: Build & run all service tests
        run: |
          docker compose -f docker-compose.test.yml up \
            --build --abort-on-container-exit

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
