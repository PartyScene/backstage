<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New RSVP</title>
</head>
<body style="margin:0;padding:0;background-color:#09090b;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#ffffff;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#09090b;">
<tr><td align="center" style="padding:40px 16px;">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

<!-- ============================================ -->
<!-- HEADER                                       -->
<!-- ============================================ -->
<tr><td style="border-radius:20px 20px 0 0;background:linear-gradient(160deg,#0f0a1e 0%,#1a0e2e 30%,#2d1654 70%,#3b1d6e 100%);padding:52px 40px;text-align:center;border:1px solid rgba(139,92,246,0.15);border-bottom:none;">

  <p style="margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:4px;color:rgba(168,85,247,0.7);font-weight:600;">New RSVP</p>
  <h1 style="margin:0 0 10px;font-size:28px;font-weight:700;line-height:1.3;color:#ffffff;letter-spacing:-0.3px;">Someone's coming to your event</h1>
  <p style="margin:0;font-size:15px;color:rgba(255,255,255,0.55);">{{ payload.event_name }}</p>

</td></tr>

<!-- ============================================ -->
<!-- ATTENDEE INFO                                -->
<!-- ============================================ -->
<tr><td style="background-color:#0f0f14;padding:48px 40px;text-align:center;border-left:1px solid rgba(139,92,246,0.1);border-right:1px solid rgba(139,92,246,0.1);">

  <p style="margin:0 0 6px;font-size:22px;font-weight:700;color:#ffffff;">{{ payload.attendee_name }}</p>
  <p style="margin:0 0 32px;font-size:14px;color:rgba(255,255,255,0.4);">just RSVP'd to your event</p>

  <!-- CTA -->
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
  <tr>
    <td style="background:linear-gradient(160deg,#7c3aed,#6366f1);border-radius:10px;padding:14px 36px;">
      <a href="https://partyscene.app/events/{{ payload.event_id }}" style="color:#ffffff;text-decoration:none;font-size:14px;font-weight:700;letter-spacing:0.3px;">View Event Dashboard</a>
    </td>
  </tr>
  </table>

</td></tr>

<!-- ============================================ -->
<!-- FOOTER                                       -->
<!-- ============================================ -->
<tr><td style="background:linear-gradient(160deg,#0d0b14,#09090b);border-radius:0 0 20px 20px;padding:28px 40px;text-align:center;border:1px solid rgba(139,92,246,0.1);border-top:1px solid rgba(139,92,246,0.06);">

  <p style="margin:0 0 4px;font-size:13px;font-weight:600;color:rgba(168,85,247,0.4);">PartyScene</p>
  <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.18);">You received this because you're hosting an event on PartyScene.</p>

</td></tr>

</table>
</td></tr>
</table>

</body>
</html>
