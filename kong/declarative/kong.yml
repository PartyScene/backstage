_format_version: "3.0"
_transform: true

services:

- host: microservices.auth
  name: register-user-service
  port: 5510
  protocol: http
  path: /register
  routes:
  - name: register-new-user
    paths:
    - /auth/register
    strip_path: true
    methods:
      - POST

- host: microservices.events
  name: fetch-event-service
  port: 5510
  protocol: http
  path: /all
  routes:
  - name: fetch-all-events
    paths:
    - /events/all
    strip_path: true
    methods:
      - GET

- host: microservices.events
  name: create-event-service
  port: 5510
  protocol: http
  path: /create
  routes:
  - name: create-new-event
    paths:
    - /events/create
    strip_path: true
    methods:
      - POST