_format_version: "3.0"
_transform: true

services:

- host: microservices.auth
  name: register-user-service
  port: 5510
  protocol: http
  path: /register
  routes:
  - name: register-new-user
    paths:
    - /auth/register
    strip_path: true
    methods:
    - POST

- host: microservices.auth
  name: login-user-service
  port: 5510
  protocol: http
  path: /login
  routes:
  - name: login-user
    paths:
    - /auth/login
    strip_path: true
    methods:
    - POST

  
  #########################
  #                       #
  #  EVENTS MICROSERVICE  #
  #                       #
  #########################


- host: microservices.events
  name: fetch-event-service
  port: 5510
  protocol: http
  path: /events/all
  routes:
  - name: fetch-all-events
    paths:
    - /events/all
    strip_path: true
    methods:
    - GET

- host: microservices.events
  name: fetch-event-by-location
  port: 5510
  protocol: http
  path: /events/location
  routes:
  - name: fetch-events-location
    paths:
    - /events/location
    strip_path: true
    methods:
    - GET

- host: microservices.events
  name: fetch-nearby-event-service
  port: 5510
  protocol: http
  path: /events/nearby
  routes:
  - name: fetch-nearby-events
    paths:
    - /events/nearby
    strip_path: true
    methods:
    - GET

- host: microservices.events
  name: create-event-service
  port: 5510
  protocol: http
  path: /create
  routes:
  - name: create-new-event
    paths:
    - /events/create
    strip_path: true
    methods:
    - POST

- host: microservices.events
  name: event-live-updates-service
  port: 5510
  protocol: http
  path: /events
  routes:
  - name: update-event-status
    paths:
    - ~/events/[a-zA-Z0-9]+/status
    strip_path: true
    methods:
    - PATCH
  - name: start-event-live-updates
    paths:
    - ~/events/[a-zA-Z0-9]+/live
    strip_path: true
    methods:
    - GET
  - name: stop-event-live-updates
    paths:
    - ~/events/[a-zA-Z0-9]+/live
    strip_path: true
    methods:
    - DELETE



  #######################
  #                     #
  #  USERS MICROSERVICE #
  #                     #
  #######################

- host: microservices.users
  name: fetch-user-service
  port: 5510
  protocol: http
  path: /
  routes:
  - name: fetch-user-information
    paths:
    - ~/users/[a-zA-Z0-9]+
    strip_path: false
    methods:
    - GET

- host: microservices.users
  name: delete-user-service
  port: 5510
  protocol: http
  path: /users
  routes:
  - name: delete-user-information
    paths:
    - /users/
    strip_path: true
    methods:
    - DELETE

- host: microservices.users
  name: users-relationship-service
  port: 5510
  protocol: http
  path: /friends
  routes:
  - name: create-user-relationship
    paths:
    - /users/friends
    strip_path: true
    methods:
    - POST
  - name: find-direct-connections
    paths:
    - /users/friends
    strip_path: true
    methods:
    - GET

- host: microservices.users
  name: find-user-connections-service
  port: 5510
  protocol: http
  path: /friends/connections
  routes:
  - name: find-user-connections
    paths:
    - /users/friends/connections
    strip_path: true
    methods:
    - GET

- host: microservices.users
  name: logged-user-service
  port: 5510
  protocol: http
  path: /user
  routes:
  - name: logged-user-routes
    paths:
    - /user
    strip_path: true
    methods:
    - GET 
    - PATCH
    - DELETE

- host: microservices.users
  name: profile-upload-service
  port: 5510
  protocol: http
  path: /users/upload
  routes:
  - name: upload-media
    paths:
    - /users/upload
    strip_path: true
    methods:
    - POST


  ##############################
  #                            #
  #  LIVE STREAM MICROSERVICE  #
  #                            #
  ##############################

- host: microservices.livestream
  name: scene-start-service
  port: 5510
  protocol: http
  path: /
  routes:
  - name: start-scene
    paths:
    - ~/scenes/[a-zA-Z0-9]
    strip_path: true
    methods:
    - POST

- host: microservices.livestream
  name: scene-fetch-service
  port: 5510
  protocol: http
  path: /
  routes:
  - name: fetch-scene
    paths:
    - ~/scenes/[a-zA-Z0-9]
    strip_path: true
    methods:
    - GET



  #######################
  #                     #
  #  POSTS MICROSERVICE #
  #                     #
  #######################


- host: microservices.posts
  name: posts-service
  port: 5510
  protocol: http
  path: /
  routes:
  - name: create-new-post
    paths:
    - /posts/
    strip_path: true
    methods:
    - POST
    
  - name: fetch-post
    paths:
    - /posts/
    strip_path: true
    methods:
    - GET