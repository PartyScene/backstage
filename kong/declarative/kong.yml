_format_version: "3.0"
_transform: true

services:

- host: microservices.auth
  name: register-user-service
  port: 5510
  protocol: http
  path: /register
  routes:
  - name: register-new-user
    paths:
    - /auth/register
    strip_path: true
    methods:
    - POST

- host: microservices.auth
  name: login-user-service
  port: 5510
  protocol: http
  path: /login
  routes:
  - name: login-user
    paths:
    - /auth/login
    strip_path: true
    methods:
    - POST

- host: microservices.events
  name: fetch-event-service
  port: 5510
  protocol: http
  path: /all
  routes:
  - name: fetch-all-events
    paths:
    - /events/all
    strip_path: true
    methods:
    - GET

- host: microservices.events
  name: fetch-event-by-location
  port: 5510
  protocol: http
  path: /events/location
  routes:
  - name: fetch-events-location
    paths:
    - /events/location
    strip_path: true
    methods:
    - GET

- host: microservices.events
  name: fetch-nearby-event-service
  port: 5510
  protocol: http
  path: /events/nearby
  routes:
  - name: fetch-nearby-events
    paths:
    - /events/nearby
    strip_path: true
    methods:
    - GET

- host: microservices.events
  name: create-event-service
  port: 5510
  protocol: http
  path: /create
  routes:
  - name: create-new-event
    paths:
    - /events/create
    strip_path: true
    methods:
    - POST

- host: microservices.users
  name: fetch-user-service
  port: 5510
  protocol: http
  path: /users
  routes:
  - name: fetch-user-information
    paths:
    - /users/
    strip_path: true
    methods:
    - POST

- host: microservices.users
  name: delete-user-service
  port: 5510
  protocol: http
  path: /users
  routes:
  - name: delete-user-information
    paths:
    - /users/
    strip_path: true
    methods:
    - DELETE

- host: microservices.users
  name: fetch-logged-user-service
  port: 5510
  protocol: http
  path: /me
  routes:
  - name: fetch-logged-user
    paths:
    - /users/me
    strip_path: true
    methods:
    - POST

- host: microservices.users
  name: edit-logged-user-service
  port: 5510
  protocol: http
  path: /me
  routes:
  - name: edit-logged-user
    paths:
    - /users/me
    strip_path: true
    methods:
    - PATCH

- host: microservices.users
  name: profile-upload-service
  port: 5510
  protocol: http
  path: /users/upload
  routes:
  - name: upload-media
    paths:
    - /users/upload
    strip_path: true
    methods:
    - POST
