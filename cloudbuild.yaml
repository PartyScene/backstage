steps:
- name: 'python:3.10'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      pip install flake8 &&
      flake8 --select=E9,F63,F7 . --exclude=debz

# - name: 'gcr.io/cloud-builders/docker'
#   args: ['compose', '-f', 'docker-compose.test.yml', 'up']
#   env:
#     - DB_USER=root
#     - DB_PASSWORD=rootrm
#   id: 'test'

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--target', 'prod', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.auth','--cache-from', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.auth', '-f', 'auth/Dockerfile', '.']
  # waitFor: ['test']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--target', 'prod', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.events','--cache-from', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.events', '-f', 'events/Dockerfile', '.']
  # waitFor: ['test']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--target', 'prod', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.posts','--cache-from', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.posts',  '-f', 'posts/Dockerfile', '.']
  # waitFor: ['test']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--target', 'prod', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.users','--cache-from', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.users',  '-f', 'users/Dockerfile', '.']
  # waitFor: ['test']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--target', 'prod', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.media','--cache-from', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.media',  '-f', 'media/Dockerfile', '.']
  # waitFor: ['test']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--target', 'prod', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.payments','--cache-from', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.payments',  '-f', 'payments/Dockerfile', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '--target', 'prod', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.r18e','--cache-from', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.r18e',  '-f', 'r18e/Dockerfile', '.']
  # waitFor: ['test']

- name: 'gcr.io/cloud-builders/kubectl'
  args:
    - rollout
    - restart
    - deployment
  env:
  - 'CLOUDSDK_COMPUTE_ZONE=us-central1'
  - 'CLOUDSDK_CONTAINER_CLUSTER=backstage-cluster'
  
substitutions:
  _LOCATION: us-central1 # default value
  
options:
  machineType: E2_HIGHCPU_8

images:
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.auth'
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.events'
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.posts'
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.users'
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.media'
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.payments'
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/microservices.r18e'