steps:

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/r18e.batcher', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['run', '--env-file', '.env' , '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/r18e.batcher']

substitutions:
  _LOCATION: us-central1 # default value
  
options:
  # logging: CLOUD_LOGGING_ONLY 
  machineType: E2_HIGHCPU_8

images:
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/scenes-backstage/r18e.batcher'