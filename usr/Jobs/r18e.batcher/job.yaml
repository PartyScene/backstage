taskGroups:
- taskSpec:
    runnables:
    - container: 
        imageUri: us-central1-docker.pkg.dev/partyscene-441317/scenes-backstage/r18e.batcher
    environment:
      secretVariables:
        RABBITMQ_URI: projects/288617366843/secrets/RABBITMQ_URI/versions/latest
        SURREAL_URI: projects/288617366843/secrets/SURREAL_URI/versions/latest
        SURREAL_USER: projects/288617366843/secrets/SURREAL_USER/versions/latest
        SURREAL_PASS: projects/288617366843/secrets/SURREAL_PASS/versions/latest
allocationPolicy:
  instances:
    # - install_gpu_drivers: true
    - policy:
        machineType: c2d-highcpu-8
        provisioningModel: SPOT
        # accelerators:
        #   - type: nvidia-l4
        #     count: 1
      
  network:
    networkInterfaces:
      - network: global/networks/default
        subnetwork: projects/partyscene-441317/regions/us-central1/subnetworks/default

logsPolicy:
  destination: CLOUD_LOGGING