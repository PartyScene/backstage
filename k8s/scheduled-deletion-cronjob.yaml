apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduled-deletion-cleanup
  namespace: default
  labels:
    app: microserv.auth
    component: cleanup-job
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: microserv.auth
            component: cleanup-job
        spec:
          restartPolicy: OnFailure
          serviceAccountName: default
          containers:
          - name: deletion-cleanup
            image: us-central1-docker.pkg.dev/partyscene-441317/scenes-backstage/microservices.auth:latest
            imagePullPolicy: Always
            command:
            - python
            - -m
            - auth.src.jobs.scheduled_deletion_cleanup
            env:
            - name: SURREAL_URI
              valueFrom:
                configMapKeyRef:
                  name: microserv.auth-config-xn0q
                  key: SURREAL_URI
            - name: SURREAL_USER
              valueFrom:
                configMapKeyRef:
                  name: microserv.auth-config-xn0q
                  key: SURREAL_USER
            - name: SURREAL_PASS
              valueFrom:
                configMapKeyRef:
                  name: microserv.auth-config-xn0q
                  key: SURREAL_PASS
            - name: REDIS_URI
              valueFrom:
                configMapKeyRef:
                  name: microserv.auth-config-xn0q
                  key: REDIS_URI
            - name: STRIPE_SECRET_KEY
              valueFrom:
                configMapKeyRef:
                  name: microserv.auth-config-xn0q
                  key: STRIPE_SECRET_KEY
            - name: ENVIRONMENT
              value: "production"
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"

