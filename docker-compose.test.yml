networks:
  partyscene_network:
    external: true
    ipam:
      config:
        - subnet: 11.0.0.0/24

services:
  microservices.auth:
    container_name: microservices.auth
    build:
      context: .
      dockerfile: auth/Dockerfile
      target: test
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.14
    restart: always
    depends_on:
      - redis
      - surrealdb
    env_file:
      - .env
    volumes:
      - ./init/schema.surql:/home/schema.surql
      - ./state:/tmp/state
    environment:
      - SCHEMA_FILE=/home/schema.surql

  microservices.media:
    container_name: microservices.media
    build:
      target: test
      context: .
      dockerfile: media/Dockerfile
    restart: always
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.15
    depends_on:
      microservices.events:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ${GCLOUD_AUTH_DIR}:/root/.config/gcloud:ro

  microservices.livestream:
    container_name: microservices.livestream
    build:
      target: test
      context: .
      dockerfile: livestream/Dockerfile
    restart: always
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.13
    env_file:
      - .env
    volumes:
      - ${GCLOUD_AUTH_DIR}:/root/.config/gcloud:ro
    depends_on:
      microservices.events:
        condition: service_completed_successfully

  microservices.events:
    container_name: microservices.events
    build:
      target: test
      context: .
      dockerfile: events/Dockerfile
    restart: always
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.12
    env_file:
      - .env
    depends_on:
      microservices.auth:
        condition: service_completed_successfully

  microservices.posts:
    container_name: microservices.posts
    build:
      target: test
      context: .
      dockerfile: posts/Dockerfile
    restart: always
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.11
    env_file:
      - .env
    volumes:
      - ${GCLOUD_AUTH_DIR}:/root/.config/gcloud:ro
    depends_on:
      microservices.media:
        condition: service_completed_successfully
  microservices.users:
    container_name: microservices.users
    build: 
      target: test
      context: .
      dockerfile: users/Dockerfile
    restart: always
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.10
    env_file:
      - .env
    depends_on:
      microservices.auth:
        condition: service_completed_successfully

