networks:
  default:
    external: true
    name: cloudbuild

services:
  microservices.auth:
    container_name: microservices.auth
    build:
      context: .
      dockerfile: auth/Dockerfile
      target: test
    # networks: 
    #   - backstage_network
    depends_on:
      - redis
    restart: on-failure
    # env_file:
    #   - .env
    volumes:
      - ./init/schema.surql:/home/schema.surql
    environment:
      - SCHEMA_FILE=/home/schema.surql

  microservices.media:
    container_name: microservices.media
    build:
      target: test
      context: .
      dockerfile: media/Dockerfile
    depends_on:
      microservices.auth:
        condition: service_completed_successfully
    volumes:
      - ./init/schema.surql:/home/schema.surql

