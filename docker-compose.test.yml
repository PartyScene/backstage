  redis:
    image: redis
    
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.18

  surrealdb:
    container_name: surrealdb
    env_file:
      - .env
    entrypoint:
      - /surreal
      - start
      - --user
      - $DB_USER
      - --pass
      - $DB_PASSWORD
      - memory

    image: surrealdb/surrealdb:v2.0-dev
    ports:
      - 8000:8000
    networks:
      partyscene_network:
        ipv4_address: 11.0.0.20