services:

  microservices.auth:
    container_name: microservices.auth
    build: auth
    restart: always
    ports:
      - "8084:5510"

  microservices.messaging:
    container_name: microservices.messaging
    build: messaging
    restart: always
    ports:
      - "8081:5510

  microservices.events:
    container_name: microservices.events
    build: events
    restart: always
    ports:
      - "8082:5510"

  microservices.posts:
    container_name: microservices.posts
    build: posts
    restart: always
    ports:
      - "8083:5510"

  microservices.users:
    container_name: microservices.users
    build: users
    restart: always
    ports:
      - "8080:5510"

  surrealdb:
    env_file:
      - .env
    entrypoint: 
      - /surreal 
      - start
      - --user
      - $DB_USER
      - --pass
      - $DB_PASSWORD
    image: surrealdb/surrealdb:latest
    ports:
      - 8000:8000
    volumes:
      - ./data/database.db:/database.db