networks:
  backstage_network:
    external: true
    ipam:
      config:
        - subnet: 10.0.0.0/24

services:

  microservices.auth:
    container_name: microservices.auth
    build: auth
    networks:
      backstage_network:
        ipv4_address: 10.0.0.14
    restart: always
    ports:
      - "8084:5510"

  microservices.messaging:
    container_name: microservices.messaging
    build: messaging
    restart: always
    networks:
      backstage_network:
        ipv4_address: 10.0.0.13
    ports:
      - "8081:5510"

  microservices.events:
    container_name: microservices.events
    build: events
    restart: always
    networks:
      backstage_network:
        ipv4_address: 10.0.0.12
    ports:
      - "8082:5510"

  microservices.posts:
    container_name: microservices.posts
    build: posts
    restart: always
    networks:
      backstage_network:
        ipv4_address: 10.0.0.11
    ports:
      - "8083:5510"

  microservices.users:
    container_name: microservices.users
    build: users
    restart: always
    networks:
      backstage_network:
        ipv4_address: 10.0.0.10
    ports:
      - "8080:5510"

  surrealdb:
    env_file:
      - .env
    entrypoint: 
      - /surreal 
      - start
      - --user
      - $DB_USER
      - --pass
      - $DB_PASSWORD
    image: surrealdb/surrealdb:v2.0-dev
    ports:
      - 8000:8000
    networks:
      backstage_network:
        ipv4_address: 10.0.0.20
    volumes:
      - ./data/database.db:/database.db