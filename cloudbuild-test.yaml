steps:
# Stage 1: Code Quality Checks
- name: 'python:3.10'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      pip install flake8 bandit &&
      flake8 --select=E9,F63,F7,F82 . --exclude=.venv,debz,usr &&
      bandit -r . -x .venv,debz,usr,tests -ll
  id: 'lint'

# Stage 2: Create Docker Network for Tests (or use existing)
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      docker network create cloudbuild || echo "Network already exists, continuing..."
  id: 'create-network'

# Stage 3: Run Integration Tests
- name: 'gcr.io/cloud-builders/docker'
  args: 
    - 'compose'
    - '-f'
    - 'docker-compose.test.yml'
    - 'up'
    - '--abort-on-container-exit'
    - '--exit-code-from'
    - 'microservices.users'  # Last service in dependency chain
  waitFor: ['create-network', 'lint']
  timeout: 1200s  # 20 minutes for full test suite
  id: 'integration-tests'

# Stage 4: Cleanup Test Containers
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      docker-compose -f docker-compose.test.yml down -v || true
      docker network rm cloudbuild || true
  waitFor: ['integration-tests']
  id: 'cleanup'

substitutions:
  _LOCATION: us-central1
  
options:
  logging: CLOUD_LOGGING_ONLY 
  machineType: E2_HIGHCPU_8